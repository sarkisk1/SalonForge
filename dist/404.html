<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#ffffff">

<title>Page not found | SalonForge</title>
<meta name="robots" content="noindex">
<meta name="description" content="This page has moved on. The SalonForge system is all still here.">
<style>
:root{
  --white:#ffffff; --alt:#f5f5f7; --ink:#1d1d1f; --sec:#86868b; --line:#d2d2d7;
  --blue:#D97757; --blue-h:#C15F3C; --blue-d:#E8946F;
  --ui:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
  --container:1080px; --gutter:clamp(22px,6vw,80px); --sec-pad:clamp(72px,10vw,128px);
  --reveal:cubic-bezier(.28,.11,.32,1); --hover:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--ink);font-family:var(--ui);font-size:17px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
svg{display:block}
::selection{background:rgba(217,119,87,.16);color:var(--ink)}
.wrap{max-width:var(--container);margin:0 auto;padding:0 var(--gutter)}
.eyebrow{font-size:.9375rem;font-weight:600;letter-spacing:0;color:var(--blue)}
.eyebrow.mute{color:var(--sec)}
h1,h2,h3,.disp{font-weight:600;letter-spacing:-.015em;line-height:1.06;text-wrap:balance}
.hl{color:var(--blue)}
.sw{font-style:normal;font-weight:600}
.band{padding:var(--sec-pad) 0;position:relative}
.band--2{background:var(--alt)}
:focus-visible{outline:2px solid var(--blue);outline-offset:3px;border-radius:6px}

/* CHAPTER RAIL */
.chapter{display:flex;align-items:baseline;justify-content:space-between;gap:20px;
  border-top:1px solid var(--line);padding-top:16px;margin-bottom:clamp(40px,6vw,64px)}
.chapter .ix{font-size:.95rem;color:var(--blue);font-weight:600;
  font-variant-numeric:tabular-nums;letter-spacing:0;flex:none}
.chapter .lbl{font-size:.9375rem;font-weight:600;letter-spacing:0;color:var(--sec)}
.chapter .end{font-size:.9375rem;color:var(--sec);letter-spacing:0;text-align:right}
@media(max-width:600px){.chapter .end{display:none}}

/* reveal */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s var(--reveal),transform .6s var(--reveal)}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.07s}.d2{transition-delay:.14s}.d3{transition-delay:.21s}.d4{transition-delay:.28s}.d5{transition-delay:.35s}

/* buttons */
.btn{font-family:var(--ui);font-weight:500;font-size:1.0625rem;padding:12px 22px;border-radius:980px;border:1px solid transparent;cursor:pointer;transition:background .25s var(--hover),color .25s var(--hover),transform .2s var(--hover);display:inline-flex;align-items:center;gap:8px;white-space:nowrap;line-height:1.1}
.btn-g{background:var(--blue);color:#fff}
.btn-g:hover{background:var(--blue-h)}
.btn-o{background:transparent;color:var(--blue);border-color:transparent;padding:12px 0;font-weight:400}
.btn-o:hover{color:var(--blue-h)}
.btn-o .ar{transition:transform .3s var(--hover)}
.btn-o:hover .ar{transform:translateX(3px)}
.ghost{color:var(--blue);font-weight:400;font-size:1.0625rem;display:inline-flex;align-items:center;gap:5px;transition:color .22s var(--hover)}
.ghost:hover{color:var(--blue-h)}
.ghost .ar{transition:transform .3s var(--hover)}
.ghost:hover .ar{transform:translateX(3px)}

/* NAV */
header{position:fixed;inset:0 0 auto 0;z-index:100;transition:background .4s var(--reveal),border-color .4s var(--reveal),backdrop-filter .4s}
header.sc{background:rgba(255,255,255,.82);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--line)}
header:not(.sc){border-bottom:1px solid transparent}
.nav{display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{font-size:1.3125rem;font-weight:600;letter-spacing:-.02em;display:inline-flex;align-items:baseline;color:var(--ink)}
.brand .dot{color:var(--blue)}
.navlinks{display:flex;gap:34px;font-size:.9375rem;color:var(--ink);font-weight:400}
.navlinks a{transition:color .2s;opacity:.82}.navlinks a:hover{opacity:1;color:var(--blue)}
@media(max-width:900px){.navlinks{display:none}}
header .btn-g{padding:8px 16px;font-size:.9375rem;font-weight:500}

/* HERO */
.hero{position:relative;padding:clamp(118px,16vh,172px) 0 clamp(30px,5vh,60px);overflow:hidden;background:var(--white)}
.hero::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(48% 46% at 84% 42%,rgba(232,148,111,.06),transparent 64%)}
.hero-grid{position:relative;display:grid;grid-template-columns:1.08fr .92fr;gap:clamp(28px,5vw,72px);align-items:center}
@media(max-width:920px){.hero-grid{grid-template-columns:1fr;gap:clamp(24px,7vw,44px)}}
.hero-inner{max-width:33rem}
.hero h1{font-size:clamp(2.5rem,4.8vw,4rem);font-weight:600;margin:18px 0 22px;line-height:1.07;letter-spacing:-.018em;max-width:15ch}
.hero .lede{max-width:36ch}
.hero .lede-1{font-weight:500;font-size:clamp(1.25rem,2vw,1.6rem);color:var(--ink);line-height:1.22;letter-spacing:-.01em}
.hero .lede-2{color:var(--sec);font-size:clamp(1.0625rem,1.25vw,1.175rem);margin-top:14px;max-width:44ch;line-height:1.45}
.hero .actions{display:flex;gap:22px;align-items:center;flex-wrap:wrap;margin-top:30px}
@media(max-width:920px){.hero-inner{max-width:none}.hero h1{max-width:18ch}}

/* HERO constellation preview */
.hero-cluster{position:relative;width:min(120%,700px);margin:0 auto;aspect-ratio:1/1;justify-self:end;align-self:center;transform:translateY(-40px)}
.hero-cluster::before{content:"";position:absolute;inset:-12%;border-radius:50%;pointer-events:none;
  background:radial-gradient(closest-side,rgba(232,148,111,.14),rgba(232,148,111,.05) 46%,transparent 72%);
  filter:blur(6px);animation:cluglow 7s ease-in-out infinite}
@keyframes cluglow{50%{opacity:.7;transform:scale(1.04)}}
@media(max-width:920px){.hero-cluster{width:min(88vw,460px);justify-self:center;transform:none}}
@media(max-width:480px){.hero-cluster{width:min(94vw,390px)}}
.hc-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.hc-conn{fill:none;stroke:url(#heroSpoke);stroke-width:1.15;opacity:.85;stroke-linecap:round}
.hc-ring{fill:none;stroke:var(--blue-d);stroke-width:.35;opacity:.34;stroke-dasharray:2.4 3;animation:spin 26s linear infinite;transform-origin:50px 50px}
.hc-ring.b{opacity:.2;stroke-dasharray:1 4.5;animation-duration:40s;animation-direction:reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.hc-pkt{fill:var(--blue-d);filter:drop-shadow(0 0 2.6px rgba(232,148,111,.7));animation:hcflow 3s linear infinite}
@keyframes hcflow{from{offset-distance:0%;opacity:0}12%{opacity:1}80%{opacity:1}to{offset-distance:100%;opacity:0}}
.cnode{position:absolute;transform:translate(-50%,-50%);width:clamp(46px,10vw,67px);height:clamp(46px,10vw,67px);border-radius:18px;background:var(--alt);border:1px solid var(--line);display:grid;place-items:center;color:var(--ink);--dot:var(--blue);z-index:2;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.cnode svg{width:56%;height:56%}
.cnode.core{width:clamp(96px,22vw,138px);height:clamp(96px,22vw,138px);border-radius:28px;border:1px solid rgba(232,148,111,.4);color:var(--blue);--dot:var(--blue);z-index:3;
  background:radial-gradient(circle at 50% 38%,#ffffff 0%,#fff4ef 40%,#ffe4d7 100%);
  box-shadow:0 10px 40px rgba(232,148,111,.28),0 0 60px rgba(232,148,111,.22),inset 0 1px 2px rgba(255,255,255,.9);animation:corepulse 5s ease-in-out infinite}
.cnode.core svg{width:50%;height:50%}
@keyframes corepulse{50%{box-shadow:0 10px 40px rgba(232,148,111,.34),0 0 80px rgba(232,148,111,.32),inset 0 1px 2px rgba(255,255,255,.9)}}

/* PROOF RIBBON */
.ribbon{border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.ribbon .wrap{display:flex;align-items:center;justify-content:center;gap:26px;flex-wrap:wrap;padding:26px var(--gutter);text-align:center}
.ribbon .fact{display:inline-flex;align-items:baseline;gap:9px;font-size:1rem;color:var(--sec)}
.ribbon .fact .live{align-self:center}
.ribbon .fact .n{color:var(--ink);font-weight:600;font-size:1.3rem;letter-spacing:-.01em;font-variant-numeric:tabular-nums;line-height:1}
.ribbon .sep{width:5px;height:5px;border-radius:50%;background:var(--line)}
.ribbon .live{width:8px;height:8px;border-radius:50%;background:var(--blue);box-shadow:0 0 10px rgba(217,119,87,.5);animation:blink 2.4s ease-in-out infinite}
@keyframes blink{50%{opacity:.35}}
@media(max-width:640px){.ribbon .sep{display:none}.ribbon .wrap{gap:16px;flex-direction:column}}

/* ICON TILE */
.tile{width:var(--ts,52px);height:var(--ts,52px);border-radius:15px;background:var(--white);border:1px solid var(--line);display:grid;place-items:center;color:var(--ink);--dot:var(--blue);flex:none;transition:transform .3s var(--hover),border-color .3s var(--hover),box-shadow .3s var(--hover)}
.tile svg{width:60%;height:60%}

/* SYSTEM HUB — full-bleed black Apple product-reveal section */
.hub-sec{position:relative;overflow:hidden;background:#000000;color:#fff;padding:clamp(84px,11vw,140px) 0}
.hub-sec::before{content:"";position:absolute;inset:0;background:radial-gradient(52% 56% at 50% 52%,rgba(232,148,111,.12),transparent 70%);pointer-events:none}
.hub-sec .chapter{border-top-color:rgba(255,255,255,.14)}
.hub-sec .chapter .ix{color:var(--blue-d)}
.hub-sec .chapter .lbl,.hub-sec .chapter .end{color:rgba(255,255,255,.5)}
.hub-sec .eyebrow{color:var(--blue-d)}
.hub-head{text-align:center;max-width:60ch;margin:0 auto clamp(28px,5vw,52px)}
.hub-head h2{font-size:clamp(2rem,4.4vw,3.4rem);margin:14px 0 0;color:#fff;letter-spacing:-.02em}
.hub-head .hl{color:var(--blue-d)}
.hub{position:relative;width:min(640px,92vw);margin:0 auto;aspect-ratio:1/1}
.hub-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.conn{stroke:url(#spokeGrad);stroke-width:1.15;opacity:.8;fill:none;stroke-linecap:round;transition:opacity .3s var(--hover),stroke .3s var(--hover),stroke-width .3s var(--hover)}
.conn.lit{stroke:var(--blue-d);opacity:1;stroke-width:1.7;filter:drop-shadow(0 0 4px rgba(232,148,111,.85))}
.core-ring{fill:none;stroke:var(--blue-d);stroke-width:.4;opacity:.42;stroke-dasharray:2.4 3.2;animation:spin 30s linear infinite;transform-origin:50px 50px}
.core-ring.b{opacity:.24;stroke-dasharray:1 4;animation-duration:44s;animation-direction:reverse}
.pkt{fill:#fff;filter:drop-shadow(0 0 4px rgba(232,148,111,.95))}
.pkt-anim{animation:flow 2.9s linear infinite}
.pkt.lit-pkt{animation-duration:1.7s;fill:var(--blue-d)}
@keyframes flow{from{offset-distance:0%;opacity:0}9%{opacity:1}84%{opacity:1}to{offset-distance:100%;opacity:0}}
.hub-node{position:absolute;transform:translate(-50%,-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:default}
.hub-node .tile{--ts:clamp(58px,9vw,78px);background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.16);color:#fff;--dot:var(--blue-d);backdrop-filter:blur(6px)}
.hub-node .nm{font-size:clamp(.75rem,1.6vw,.86rem);font-weight:500;letter-spacing:0;color:rgba(255,255,255,.62);transition:color .3s}
.hub-node:hover .tile,.hub-node.act .tile{transform:scale(1.09);border-color:rgba(232,148,111,.7);box-shadow:0 0 32px -4px rgba(232,148,111,.6)}
.hub-node:hover .nm,.hub-node.act .nm{color:#fff}
.hub-node.core{z-index:4}
.hub-node.core .tile{--ts:clamp(108px,19vw,150px);border:1px solid rgba(232,148,111,.55);color:var(--blue);--dot:var(--blue);overflow:visible;position:relative;backdrop-filter:none;
  background:radial-gradient(circle at 50% 38%,#ffffff 0%,#fff2ec 42%,#ffdfd0 100%);
  box-shadow:0 20px 70px rgba(232,148,111,.4),0 0 90px rgba(232,148,111,.35),inset 0 1px 3px rgba(255,255,255,.95);animation:corepulse2 5s ease-in-out infinite}
.hub-node.core .tile::after{content:"";position:absolute;inset:-46%;border-radius:50%;z-index:-1;pointer-events:none;
  background:radial-gradient(closest-side,rgba(232,148,111,.35),rgba(232,148,111,.1) 46%,transparent 72%);filter:blur(8px);animation:corehalo 5s ease-in-out infinite}
.hub-node.core .tile svg{width:52%;height:52%;position:relative}
@keyframes corepulse2{50%{box-shadow:0 20px 70px rgba(232,148,111,.5),0 0 120px rgba(232,148,111,.5),inset 0 1px 3px rgba(255,255,255,.95)}}
@keyframes corehalo{50%{opacity:.7;transform:scale(1.08)}}
/* unified hub motion: retire spinning rings + chunky packets -> streaming data-pulses to the core */
.hc-ring,.core-ring{display:none}
.hubpulse{fill:none;stroke:var(--blue-d);stroke-width:.9;stroke-linecap:round;stroke-dasharray:1.4 6;stroke-dashoffset:0;opacity:.9;filter:drop-shadow(0 0 2px rgba(232,148,111,.85))}
@keyframes hubflow{to{stroke-dashoffset:-7.4}}
.hub.in .hubpulse,.hero-cluster.in .hubpulse{animation:hubflow 2.2s linear infinite;animation-delay:var(--d,0s)}
.hub.in .hubpulse.lit{stroke:#fff;stroke-width:1.35;opacity:1;animation-duration:1.2s;filter:drop-shadow(0 0 3px rgba(255,255,255,.95))}
/* calmer, slower core breathing */
.hub-node.core .tile,.hub-node.core .tile::after,.cnode.core{animation-duration:6.5s}
.hub-node.core .nm{font-size:clamp(1rem,2.1vw,1.25rem);color:#fff;font-weight:600;letter-spacing:-.01em}
.hub-node.core .tag{font-size:.72rem;letter-spacing:.04em;color:var(--blue-d);font-weight:600;margin-top:1px}
.spoke-lbl{position:absolute;transform:translate(-50%,-50%);z-index:2;font-family:var(--ui);font-size:clamp(.58rem,1.15vw,.68rem);font-weight:500;letter-spacing:.02em;color:rgba(255,255,255,.55);background:rgba(255,255,255,.06);backdrop-filter:blur(6px);padding:4px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);white-space:nowrap;pointer-events:none;transition:color .3s,border-color .3s,background .3s}
.spoke-lbl b{color:var(--blue-d);font-weight:600}
.spoke-lbl.lit{color:#fff;border-color:rgba(232,148,111,.5);background:rgba(232,148,111,.14)}
@media(max-width:640px){.spoke-lbl{display:none}}
.hub-cap{text-align:center;margin:clamp(28px,4vw,44px) auto 0;max-width:52ch;min-height:2.8em;font-size:clamp(1.0625rem,1.5vw,1.25rem);color:rgba(255,255,255,.62);transition:opacity .3s;line-height:1.5}
.hub-cap b{color:#fff;font-weight:600}
.hub-cap .who{color:var(--blue-d);font-weight:600}
@media(max-width:560px){
  .hub{aspect-ratio:auto;width:100%;display:flex;flex-direction:column;align-items:center;gap:18px}
  .hub-svg{display:none}
  .hub-node{position:static!important;transform:none;flex-direction:row;gap:14px;width:100%;max-width:320px;justify-content:flex-start}
  .hub-node.core{order:-1}
}

/* EVERYTHING GRID */
.sec-head{max-width:64ch;margin:0 auto clamp(40px,5vw,60px);text-align:center}
.sec-head h2{font-size:clamp(2rem,4.4vw,3.4rem);margin:0 0 16px;letter-spacing:-.02em}
.sec-head p{color:var(--sec);font-size:1.1875rem;max-width:52ch;margin:0 auto;line-height:1.45}
.grid6{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:840px){.grid6{grid-template-columns:1fr 1fr}}
@media(max-width:540px){.grid6{grid-template-columns:1fr}}
.gcard{position:relative;background:var(--alt);border:1px solid var(--line);border-radius:20px;padding:28px 28px 30px;transition:transform .35s var(--reveal),box-shadow .35s var(--reveal)}
.gcard:hover{transform:translateY(-4px);box-shadow:0 18px 44px -20px rgba(0,0,0,.22)}
.gcard .top{display:flex;align-items:center;gap:14px}
.gcard .zone{font-size:.9375rem;letter-spacing:0;color:var(--sec);font-weight:500}
.gcard .top .tile{background:var(--white)}
/* elevated source-of-truth card */
.gcard.hero-card{background:linear-gradient(180deg,rgba(217,119,87,.06),rgba(217,119,87,.02));border-color:rgba(217,119,87,.28)}
.gcard.hero-card .top .tile{border-color:rgba(217,119,87,.35)}
.gcard.hero-card .zone{color:var(--blue)}
.gcard .spine-badge{display:inline-flex;align-items:center;gap:8px;margin-top:16px;font-size:.875rem;font-weight:600;letter-spacing:0;color:var(--blue)}
.gcard .spine-badge i{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 9px rgba(217,119,87,.55);animation:blink 2.4s ease-in-out infinite}
.gcard h3{font-size:1.4375rem;font-weight:600;letter-spacing:-.01em;line-height:1.2;margin-top:22px;color:var(--ink)}
.gcard .prod{font-size:1.0625rem;color:var(--blue);font-weight:500;margin-top:4px}
.gcard p{color:var(--sec);font-size:1.0625rem;margin-top:12px;line-height:1.5}
.grid-foot{display:flex;flex-direction:column;align-items:center;gap:24px;text-align:center;margin-top:clamp(38px,5vw,56px)}
.grid-foot .line{font-size:clamp(1.5rem,3vw,2.1rem);color:var(--ink);font-weight:600;letter-spacing:-.015em;max-width:24ch}

/* DATA SPINE FLOW */
.flow-wrap{display:grid;grid-template-columns:1fr minmax(200px,300px) 1fr;gap:0;align-items:center;max-width:1000px;margin:0 auto}
@media(max-width:860px){.flow-wrap{grid-template-columns:1fr;gap:8px;max-width:360px}}
.flow-svg{width:100%;height:auto}
.flow-path{fill:none;stroke:var(--blue);stroke-width:1.3;opacity:.5;stroke-linecap:round;stroke-dasharray:var(--len);stroke-dashoffset:var(--len);transition:stroke-dashoffset 1.3s var(--reveal)}
.flow.in .flow-path{stroke-dashoffset:0}
.flow-spine{stroke:var(--blue);stroke-width:2.6;opacity:.95}
.flow-note{color:var(--sec);font-size:1.0625rem;max-width:44ch;margin:0 auto;text-align:center}
.flow-note b{color:var(--ink);font-weight:600}
/* single-svg spine diagram: labels on line ends + data flowing to the brain */
.flow-diagram{position:relative;max-width:1000px;margin:0 auto}
.flow-net{width:100%;height:auto;display:block;overflow:visible}
.wire{fill:none;stroke:var(--blue);stroke-width:1.4;opacity:.3;stroke-linecap:round;stroke-dasharray:var(--len);stroke-dashoffset:var(--len);transition:stroke-dashoffset 1.5s var(--reveal)}
.flow.in .wire{stroke-dashoffset:0}
.pulse{fill:none;stroke:var(--blue);stroke-width:2.6;stroke-linecap:round;stroke-dasharray:6 150;stroke-dashoffset:0;opacity:0;filter:drop-shadow(0 0 5px rgba(217,119,87,.65))}
.flow.in .pulse{opacity:1;animation:flowPulse 2.6s linear infinite;animation-delay:var(--d,0s)}
@keyframes flowPulse{from{stroke-dashoffset:0}to{stroke-dashoffset:-156}}
.node-glow{fill:rgba(217,119,87,.16);transform-box:fill-box;transform-origin:center;animation:nodeBreath 2.6s ease-in-out infinite}
@keyframes nodeBreath{0%,100%{transform:scale(1);opacity:.45}50%{transform:scale(1.4);opacity:.85}}
.fl-label{position:absolute;transform:translateY(-50%);line-height:1.22}
.fl-label b{display:block;color:var(--ink);font-weight:600;font-size:1.0625rem;letter-spacing:-.01em}
.fl-label span{display:block;color:var(--sec);font-size:.9375rem;margin-top:2px}
.fl-label.l{left:1%;width:18%;text-align:right}
.fl-label.r{right:1%;width:18%;text-align:left}
.fl-label.center{left:50%;top:63%;transform:translate(-50%,0);text-align:center}
@media(prefers-reduced-motion:reduce){.pulse{animation:none;opacity:.55}.node-glow{animation:none}}
@media(max-width:680px){.fl-label b{font-size:.78rem}.fl-label span{display:none}.fl-label.l,.fl-label.r{width:23%}.fl-label.center b{font-size:.85rem}}

/* PER-PRODUCT BEATS */
.beat{display:grid;grid-template-columns:1fr 1fr;gap:clamp(40px,7vw,110px);align-items:center;padding:clamp(48px,7vw,92px) 0;border-top:1px solid var(--line)}
.beat:first-of-type{border-top:none;padding-top:clamp(8px,2vw,24px)}
.beat.rev .beat-viz{order:2}
@media(max-width:860px){.beat,.beat.rev{grid-template-columns:1fr;gap:36px}.beat.rev .beat-viz{order:0}}
.beat-copy .head{display:flex;align-items:center;gap:16px}
.beat-copy .tile{--ts:56px}
.beat-copy .kicker{font-size:1.375rem;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
.beat-copy h3{font-size:clamp(1.75rem,3.4vw,2.6rem);font-weight:600;letter-spacing:-.02em;margin:22px 0 16px;max-width:16ch}
.beat-copy p{color:var(--sec);font-size:1.1875rem;max-width:42ch;line-height:1.5}
.beat-add{margin-top:24px;padding-left:18px;border-left:2px solid var(--blue);max-width:40ch}
.beat-add span{font-size:.875rem;letter-spacing:0;color:var(--blue);font-weight:600}
.beat-add p{color:var(--ink);font-size:1.125rem;margin-top:7px;font-style:normal;font-weight:500;line-height:1.4}
.beat-viz{display:flex;justify-content:center}
.viz{width:100%;max-width:440px;aspect-ratio:1.15/1;border-radius:22px;border:1px solid var(--line);background:var(--alt);position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.05)}

/* viz: live Daviana calendar */
.dav-viz{background:#fff;overflow:hidden}
.dav{position:absolute;inset:0;display:flex;flex-direction:column;font-family:var(--ui);background:#fff;text-align:left}
.dav-bar{display:flex;align-items:center;justify-content:center;padding:7px 10px;border-bottom:1px solid var(--line);position:relative}
.dav-salon{font-size:11px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.dav-day{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:8px;font-weight:600;color:var(--blue);background:rgba(217,119,87,.1);border-radius:5px;padding:2px 6px}
.dav-head{display:grid;grid-template-columns:24px 1fr 1fr 1fr;border-bottom:1px solid var(--line);background:var(--alt)}
.dav-stf{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;border-left:1px solid var(--line)}
.dav-stf i{width:18px;height:18px;border-radius:50%;background:var(--c,#999);color:#fff;font-size:7.5px;font-weight:700;font-style:normal;display:grid;place-items:center;box-shadow:0 0 0 1.5px #fff,0 0 0 2.5px var(--c,#999)}
.dav-stf b{font-size:7.5px;font-weight:700;color:var(--ink);letter-spacing:.02em;text-transform:uppercase;white-space:nowrap}
.dav-body{flex:1;display:grid;grid-template-columns:24px 1fr 1fr 1fr;grid-template-rows:repeat(20,1fr);position:relative;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:100% 20%,calc((100% - 24px)/3) 100%;background-position:0 0,24px 0;background-repeat:repeat,repeat-x}
.dav-h{grid-column:1;font-size:7px;color:var(--sec);padding:1px 0 0 3px;align-self:start}
.appt{margin:1px;border-radius:5px;padding:3px 4px;overflow:hidden;color:#fff;display:flex;flex-direction:column;line-height:1.16;position:relative;opacity:0;box-shadow:0 1px 2px rgba(0,0,0,.12);z-index:1}
.appt b{font-size:8px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appt span:not(.tag){font-size:7px;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appt.g{background:linear-gradient(180deg,#33936a,#2c855f);border-left:2.5px solid #7fe3ac}
.appt.p{background:linear-gradient(180deg,#8b4fc0,#7a3fae);border-left:2.5px solid #cfa0ec}
.appt.brk{background:repeating-linear-gradient(45deg,#e9e7e7,#e9e7e7 3px,#f5f4f4 3px,#f5f4f4 6px);color:var(--sec);border:1px dashed var(--line);box-shadow:none}
.appt.brk b{color:var(--sec);font-size:7.5px;font-weight:600}
.appt .tag{position:absolute;top:2px;right:2px;font-size:5.5px;font-weight:800;letter-spacing:.04em;background:#fff;color:#2c855f;border-radius:3px;padding:1px 3px;line-height:1}
.appt.p .tag{color:#7a3fae}
.viz.in .appt{animation:apptIn .55s var(--reveal) both;animation-delay:var(--i,0s)}
@keyframes apptIn{from{opacity:0;transform:translateY(7px) scale(.97)}to{opacity:1;transform:none}}
.viz.in .appt.live{animation:liveDrop 4.8s ease-in-out 1.5s infinite both}
@keyframes liveDrop{0%{opacity:0;transform:translateY(-7px) scale(.96)}7%{opacity:1;transform:none}72%{opacity:1;transform:none}86%{opacity:0;transform:translateY(-4px)}100%{opacity:0}}
/* mini live diary inside the hub core tile */
.hub-node.core .tile .minidav{position:absolute;inset:13%;border-radius:9px;background:#fff;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.14);overflow:hidden;display:flex;flex-direction:column;z-index:1}
.minidav .md-top{height:15%;min-height:8px;background:linear-gradient(90deg,#f6f3f2,#efeae8);border-bottom:1px solid rgba(0,0,0,.06);position:relative}
.minidav .md-top::after{content:"";position:absolute;left:6%;top:32%;width:15%;height:34%;border-radius:2px;background:rgba(217,119,87,.55)}
.minidav .md-cols{flex:1;display:flex;gap:2px;padding:3px}
.minidav .md-col{position:relative;flex:1}
.minidav .md-b{position:absolute;left:0;right:0;border-radius:2px;opacity:0}
.minidav .md-b.g{background:linear-gradient(180deg,#33936a,#2c855f);border-left:1.5px solid #7fe3ac}
.minidav .md-b.p{background:linear-gradient(180deg,#8b4fc0,#7a3fae);border-left:1.5px solid #cfa0ec}
.hub.in .minidav .md-b{animation:apptIn .5s var(--reveal) both;animation-delay:var(--i,0s)}
.hub.in .minidav .md-b.live{animation:liveDrop 4.8s ease-in-out 1.6s infinite both}

/* viz: waveform */
/* viz: AI receptionist video + call-waveform overlay */
.ai-viz{background:#f3ede9}
.ai-viz .rcp{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.ai-viz .ai-scrim{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.05),transparent 28%,transparent 50%,rgba(24,12,7,.6))}
.wave{position:absolute;left:0;right:0;bottom:0;height:34%;display:flex;align-items:flex-end;justify-content:center;gap:5px;padding:0 12% 11%;pointer-events:none}
.wave i{width:5px;border-radius:6px;background:linear-gradient(180deg,#fff,var(--blue-d));box-shadow:0 0 8px rgba(232,148,111,.55);animation:eq 1.4s ease-in-out infinite}
/* viz: full-bleed product videos (Bar pour, People) + ColorLab bowl w/ readout overlay */
.vid-viz{background:#f3ede9;overflow:hidden}
.vid-viz video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.vid-viz .vid-scrim{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.05),transparent 30%,transparent 72%,rgba(24,12,7,.26))}
.cl-viz{background:#f3ede9;overflow:hidden}
.cl-viz .clv{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.cl-viz .cl-scrim{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.05),transparent 30%,transparent 44%,rgba(24,12,7,.68))}
.cl-viz .cl-readout{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:36px;padding:0 0 18px;font-family:var(--ui);font-variant-numeric:tabular-nums;pointer-events:none}
.cl-viz .rd{text-align:center}
.cl-viz .rd .v{font-size:1.9rem;font-weight:600;color:#fff;line-height:1;letter-spacing:-.02em;text-shadow:0 1px 10px rgba(0,0,0,.45)}
.cl-viz .rd .v.c{color:#ffd9c7}
.cl-viz .rd .u{font-size:.8rem;color:rgba(255,255,255,.88);margin-top:7px;text-shadow:0 1px 8px rgba(0,0,0,.45)}
/* viz: People app demo — Hire · Fire · Track · Organise -> contract signed */
.pa-viz{background:#14110e;overflow:hidden}
.pa{position:absolute;inset:0;display:flex;flex-direction:column;font-family:var(--ui);color:#fff;background:radial-gradient(120% 90% at 50% 0%,#241d17,#14110e 72%)}
.pa-nav{display:flex;gap:5px;padding:9px 10px 8px;border-bottom:1px solid rgba(255,255,255,.08)}
.pa-pill{font-size:9px;font-weight:600;letter-spacing:.01em;color:rgba(255,255,255,.5);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:3px 9px;transition:.35s}
.pa-pill.on{color:#fff;background:rgba(232,148,111,.16);border-color:rgba(232,148,111,.5);box-shadow:0 0 12px -4px rgba(232,148,111,.6)}
.pa-body{position:relative;flex:1}
.pa-screen{position:absolute;inset:0;padding:12px 13px;opacity:0;transform:translateY(6px);transition:opacity .5s var(--reveal),transform .5s var(--reveal);pointer-events:none}
.pa-screen.on{opacity:1;transform:none}
.pa-h{font-size:10px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.02em;margin-bottom:9px}
.pa-h b{color:#fff;font-weight:600}
.pa-rota{display:grid;grid-template-columns:46px repeat(5,1fr);gap:3px;font-size:7px;align-items:center}
.pa-rota .d{color:rgba(255,255,255,.38);text-align:center;font-weight:600}
.pa-rota .nm{color:rgba(255,255,255,.72);font-weight:600;white-space:nowrap}
.pa-rota .c{height:15px;border-radius:3px;background:rgba(255,255,255,.05)}
.pa-rota .c.sh{background:linear-gradient(180deg,#E8946F,#c96b45);box-shadow:0 0 8px -3px rgba(232,148,111,.7)}
.pa-stats{display:flex;gap:8px}
.pa-stat{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:11px 8px}
.pa-stat b{display:block;font-size:22px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
.pa-stat span{display:block;font-size:7.5px;color:rgba(255,255,255,.5);margin-top:5px;text-transform:uppercase;letter-spacing:.05em}
.pa-stat.hl b{color:#E8946F}
.pa-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px 10px;margin-bottom:6px}
.pa-row b{font-size:10px;font-weight:600;color:#fff}
.pa-row span{font-size:8px;color:rgba(255,255,255,.42);margin-left:auto}
.pa-row i{font-size:7.5px;font-weight:700;letter-spacing:.04em;padding:2px 6px;border-radius:5px;font-style:normal;flex:none}
.pa-row i.ok{color:#7fe3ac;background:rgba(70,180,120,.14);border:1px solid rgba(70,180,120,.35)}
.pa-row i.mut{color:rgba(255,255,255,.55);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
.pa-doc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:13px;position:relative;overflow:hidden}
.pa-doc-t b{font-size:11px;font-weight:600;color:#fff;display:block}
.pa-doc-t span{font-size:8.5px;color:rgba(255,255,255,.5)}
.pa-sig{margin-top:16px;height:32px;border-top:1px dashed rgba(255,255,255,.2);position:relative}
.pa-sig svg{position:absolute;left:6px;top:3px;width:92px;height:28px}
.pa-sig path{fill:none;stroke:#E8946F;stroke-width:2;stroke-linecap:round;stroke-dasharray:230;stroke-dashoffset:230}
.pa-screen.on[data-k="sign"] .pa-sig path{animation:sigDraw 1.1s var(--reveal) .35s forwards}
@keyframes sigDraw{to{stroke-dashoffset:0}}
.pa-stamp{position:absolute;right:12px;bottom:12px;font-size:11px;font-weight:800;letter-spacing:.08em;color:#7fe3ac;border:2px solid #7fe3ac;border-radius:7px;padding:3px 9px;transform:scale(1.6) rotate(-8deg);opacity:0}
.pa-screen.on[data-k="sign"] .pa-stamp{animation:stampPop .5s var(--reveal) 1.4s forwards}
@keyframes stampPop{0%{transform:scale(1.6) rotate(-8deg);opacity:0}60%{transform:scale(.92) rotate(-8deg);opacity:1}100%{transform:scale(1) rotate(-8deg);opacity:1}}
@keyframes eq{0%,100%{height:14%}50%{height:82%}}

/* viz: scale readout (ColorLab) */
.scale{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:30px}
.scale .bowl{width:132px;height:108px;border-radius:0 0 66px 66px;border:2px solid var(--line);border-top:none;position:relative;overflow:hidden;background:var(--white)}
.scale .fill{position:absolute;left:0;right:0;bottom:0;height:14%;background:linear-gradient(180deg,#EFB197,#D97757);transition:height 1.6s var(--reveal)}
.scale.in .fill{height:74%}
.scale .drop{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:11px;height:14px;border-radius:0 50% 50% 50%;background:var(--blue);rotate:45deg;box-shadow:0 0 12px -1px rgba(217,119,87,.6);animation:dropb 2.4s ease-in-out infinite}
@keyframes dropb{0%,100%{transform:translateX(-50%) rotate(45deg) translateY(0)}50%{transform:translateX(-50%) rotate(45deg) translateY(4px)}}
.scale .readout{display:flex;gap:26px;font-family:var(--ui);font-variant-numeric:tabular-nums}
.scale .rd{text-align:center}
.scale .rd .v{font-size:2rem;font-weight:600;color:var(--ink);line-height:1;letter-spacing:-.02em}
.scale .rd .v.c{color:var(--blue)}
.scale .rd .u{font-size:.8125rem;letter-spacing:0;color:var(--sec);margin-top:8px}

/* viz: perf bars */
.bars{position:absolute;inset:44px 48px;display:flex;align-items:flex-end;gap:14px}
.bars .b{flex:1;border-radius:8px 8px 0 0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.04));position:relative;transition:height 1s var(--reveal)}
.bars .b.peak{background:linear-gradient(180deg,var(--blue-d),var(--blue))}
.bars .b.peak::after{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;background:var(--blue);box-shadow:0 0 14px rgba(217,119,87,.6)}
.spark{position:absolute;inset:44px 48px;pointer-events:none}
.spark polyline{fill:none;stroke:var(--blue);stroke-width:2;opacity:.85;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:400;stroke-dashoffset:400;transition:stroke-dashoffset 1.4s var(--reveal) .3s}
.viz.in .spark polyline{stroke-dashoffset:0}

/* viz: people graph */
.pgraph{position:absolute;inset:0}
.pgraph svg{width:100%;height:100%}
.pgraph .lnk{stroke:var(--line);stroke-width:1.2}
.pgraph .nd{fill:var(--white);stroke:var(--sec);stroke-width:1.4}
.pgraph .nd.on{fill:var(--blue);stroke:var(--blue)}
.pgraph .nd.sig{stroke:var(--blue-d)}

/* viz: bar bubble */
.barviz{position:absolute;inset:0;display:grid;place-items:center}
.barviz svg{width:64%;height:64%;overflow:visible}
.barviz .bub{fill:var(--blue);filter:drop-shadow(0 0 4px rgba(217,119,87,.5))}
.barviz .bub-anim{animation:bub 3s ease-in-out infinite}
@keyframes bub{0%{transform:translateY(0);opacity:0}12%{opacity:1}88%{opacity:1}100%{transform:translateY(-58px);opacity:0}}
.barviz .spine-line{stroke:var(--blue);stroke-width:2;opacity:.7}
.barviz .glass{stroke:var(--ink)}

/* NUMBERS */
.nums{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;text-align:center;max-width:960px;margin:0 auto}
@media(max-width:640px){.nums{grid-template-columns:1fr;gap:40px}}
.num{padding:0 10px}
.num .n{font-size:clamp(3rem,7vw,5rem);color:var(--blue);line-height:1;font-weight:600;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.num .l{color:var(--sec);font-size:1.0625rem;margin-top:16px}
.nums-foot{text-align:center;margin-top:clamp(38px,5vw,58px);max-width:52ch;margin-inline:auto;font-size:clamp(1.25rem,2.4vw,1.7rem);color:var(--ink);font-weight:600;letter-spacing:-.015em;line-height:1.35}

/* CTA */
.cta{text-align:center;overflow:hidden}
.cta-glyph{position:absolute;bottom:-10%;left:50%;transform:translateX(-50%);width:min(80vw,760px);opacity:.6;pointer-events:none}
.cta h2{font-size:clamp(2.2rem,5vw,4rem);font-weight:600;letter-spacing:-.02em;position:relative;margin-bottom:20px}
.cta p{color:var(--sec);max-width:48ch;margin:0 auto 32px;position:relative;font-size:1.1875rem;line-height:1.45}
.cta .actions{display:flex;gap:22px;justify-content:center;align-items:center;flex-wrap:wrap;position:relative}
.cta .btn-o{border:1px solid var(--line);border-radius:980px;padding:12px 22px;font-weight:500;color:var(--blue)}
.cta .btn-o:hover{background:var(--alt)}

/* FOOTER */
footer{border-top:1px solid var(--line);padding:52px 0 40px;background:var(--alt)}
.foot{display:flex;justify-content:space-between;gap:28px;flex-wrap:wrap;align-items:flex-start}
.foot .tag{color:var(--sec);font-size:.9375rem;margin-top:12px;max-width:34ch}
.foot .cols{display:flex;gap:30px;flex-wrap:wrap;color:var(--sec);font-size:.9375rem}
.foot .cols a:hover{color:var(--blue)}
.foot-base{margin-top:38px;padding-top:20px;border-top:1px solid var(--line);font-size:.8125rem;color:var(--sec)}

/* docked mini-spine */
.dock{position:fixed;right:26px;top:50%;transform:translateY(-50%);z-index:40;width:26px;height:190px;pointer-events:none;opacity:0;transition:opacity .5s}
.dock.show{opacity:1}
.dock svg{width:100%;height:100%;overflow:visible}
.dock .rail{stroke:var(--line);stroke-width:2}
.dock .core-dot{fill:var(--blue);filter:drop-shadow(0 0 6px rgba(217,119,87,.55))}
.dock .fire{fill:var(--blue-d);opacity:0}
.dock .fire.go{animation:fire 1s var(--reveal)}
@keyframes fire{0%{opacity:0;cy:8}20%{opacity:1}100%{opacity:0;cy:95}}
@media(max-width:1180px){.dock{display:none}}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition-duration:.001ms!important}

  .scale .fill{height:74%}.viz.in .spark polyline{stroke-dashoffset:0}

  .pa-screen[data-k="sign"]{opacity:1;transform:none}.pa-sig path{stroke-dashoffset:0}.pa-stamp{opacity:1;transform:scale(1) rotate(-8deg)}.pa-pill[data-k="hire"]{color:#fff}
  .dock{display:none}
